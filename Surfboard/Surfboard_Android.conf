[General]
loglevel = notify
# 你的专属 7990 端口
socks-port = 7990
http-port = 7991
ipv6 = false
udp-policy-not-matched = DIRECT
dns-server = 223.5.5.5, 119.29.29.29
# 域名级跳过：补全了微信、小红书、B站、阿里、腾讯等
skip-proxy = 192.168.0.0/16, 10.0.0.0/8, 127.0.0.0/8, 224.0.0.0/4, localhost, *.local, *.lan, *.xiaohongshu.com, *.xhs.com, *.wechat.com, *.tencent.com, *.biliapi.net, *.bilibili.com, *.alipay.com, *.taobao.com, *.jd.com, *.qq.com, *.baidu.com, *.douyin.com, *.amap.com
# 应用级排除：安卓端节电最强手段
skip-proxy-apps = com.tencent.mm, com.xingin.xhs, tv.danmaku.bili, com.ss.android.ugc.aweme, com.taobao.taobao, com.eg.android.AlipayGphone, com.tencent.mobileqq, com.mini.browser

[Proxy]
DIRECT = direct

[Proxy Group]
# 1. 策略总控
🚀 默认代理 = select, 🇭🇰 香港, 🇹🇼 台湾, 🇸🇬 新加坡, 🇯🇵 日本, 🇰🇷 韩国, 🇺🇲 美国, 🌍 其他国家, DIRECT
Gemini = select, 🇺🇲 美国, 🇸🇬 新加坡, 🇭🇰 香港
YouTube = select, 🚀 默认代理, 🇭🇰 香港, 🇸🇬 新加坡, 🇺🇲 美国
Telegram = select, 🚀 默认代理, 🇭🇰 香港, 🇸🇬 新加坡, 🇺🇲 美国

🇭🇰 香港 = select, policy-path=https://sep.bbdmfetch.com/api/v1/client/subscribe?token=64ba85477145c43f96c1ddffa339287f, policy-regex-filter=(?i)港|HK|Hong
🇹🇼 台湾 = select, policy-path=https://sep.bbdmfetch.com/api/v1/client/subscribe?token=64ba85477145c43f96c1ddffa339287f, policy-regex-filter=(?i)台|TW|Taiwan
🇸🇬 新加坡 = select, policy-path=https://sep.bbdmfetch.com/api/v1/client/subscribe?token=64ba85477145c43f96c1ddffa339287f, policy-regex-filter=(?i)新|SG|Singapore
🇯🇵 日本 = select, policy-path=https://sep.bbdmfetch.com/api/v1/client/subscribe?token=64ba85477145c43f96c1ddffa339287f, policy-regex-filter=(?i)日|JP|Japan
🇰🇷 韩国 = select, policy-path=https://sep.bbdmfetch.com/api/v1/client/subscribe?token=64ba85477145c43f96c1ddffa339287f, policy-regex-filter=(?i)韩|KR|Korea
🇺🇲 美国 = select, policy-path=https://sep.bbdmfetch.com/api/v1/client/subscribe?token=64ba85477145c43f96c1ddffa339287f, policy-regex-filter=(?i)美|US|States|America
🌍 其他国家 = select, policy-path=https://sep.bbdmfetch.com/api/v1/client/subscribe?token=64ba85477145c43f96c1ddffa339287f, policy-regex-filter=^((?!(港|HK|新|SG|日|JP|韩|KR|美|US|台|TW)).)*$
🎯 直连 = select, DIRECT

[Rule]
DOMAIN,172mix.com,🎯 直连
AND,((NETWORK,UDP),(DST-PORT,443)),REJECT

# Gemini & Google最小化闭环
DOMAIN-SUFFIX,aistudio.google.com,Gemini
DOMAIN-SUFFIX,gemini.google.com,Gemini
DOMAIN-SUFFIX,generativelanguage.googleapis.com,Gemini
DOMAIN-SUFFIX,ai.google.com,Gemini
DOMAIN-KEYWORD,googleusercontent,Gemini
DOMAIN-SUFFIX,google.com,🚀 默认代理

# YouTube & Telegram
DOMAIN-SUFFIX,youtube.com,YouTube
DOMAIN-SUFFIX,googlevideo.com,YouTube
DOMAIN-SUFFIX,ytimg.com,YouTube
DOMAIN-SUFFIX,t.me,Telegram
DOMAIN-SUFFIX,telegram.me,Telegram
DOMAIN-SUFFIX,telegram.org,Telegram
DOMAIN-SUFFIX,tdesktop.com,Telegram
IP-CIDR,91.108.0.0/16,Telegram,no-resolve
IP-CIDR,109.239.140.0/24,Telegram,no-resolve
IP-CIDR,149.154.160.0/20,Telegram,no-resolve

# 常用国内 App 域名补全 (强制直连)
