name: Compile Rules
on:
  push:
    paths:
      - 'Customize/direct.list'
      - 'Customize/proxy.list'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate YAML Rules
        run: |
          cp Customize/direct.list Customize/direct.yaml
          cp Customize/proxy.list Customize/proxy.yaml

      - name: Upload
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Customize/direct.yaml Customize/proxy.yaml
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update rules"
            git push
          fi
