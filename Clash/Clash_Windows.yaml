# Clash_Windows全量同步母版 - 2026 优化版
mixed-port: 7990
allow-lan: false
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: silent
global-client-fingerprint: chrome

proxy-providers:
  Airport1:
    url: "https://sep.bbdmfetch.com/api/v1/client/subscribe?token=64ba85477145c43f96c1ddffa339287f"
    type: http
    interval: 86400
    path: ./airport1.yaml
    health-check: {enable: true, url: https://www.gstatic.com/generate_204, interval: 3600}

tun: {enable: true, stack: gvisor, auto-route: true, auto-detect-interface: true, strict-route: true, dns-hijack: ["any:53"]}

dns:
  enable: true
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "+.local"
    - "+.localhost"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "time.*.com"
    - "time.*.gov"
    - "ntp.*.com"
    - "ntp.*.com"
  default-nameserver: [223.5.5.5, 119.29.29.29]
  nameserver: [223.5.5.5, 119.29.29.29]
  proxy-server-nameserver: [223.5.5.5, "https://8.8.8.8/dns-query"]
  nameserver-policy: 
    "rule-set:cn_domain,private_domain,apple_cn_domain": [223.5.5.5]
    "rule-set:google_domain,youtube_domain,gemini_domain,gfw_domain,Jacking_proxy": ["https://8.8.8.8/dns-query"]
    
proxy-groups:
  - {name: "🚀 默认代理", type: select, use: [Airport1], proxies: [DIRECT, REJECT]}
  - {name: "Gemini", type: select, proxies: ["🚀 默认代理", "🇺🇲 美国", "🇭🇰 香港", "🇸🇬 新加坡"]}
  - {name: "Google", type: select, proxies: ["🚀 默认代理", "🇺🇲 美国", "🇭🇰 香港", "🇸🇬 新加坡"]}
  - {name: "YouTube", type: select, proxies: ["🚀 默认代理", "🇺🇲 美国", "🇭🇰 香港", "🇸🇬 新加坡"]}
  - {name: "Telegram", type: select, proxies: ["🚀 默认代理", "🇺🇲 美国", "🇭🇰 香港", "🇸🇬 新加坡"]}
  - {name: "Onedrive", type: select, proxies: ["🚀 默认代理", "🇺🇲 美国", "🇭🇰 香港", "🇸🇬 新加坡"]}
  - {name: "🎯 直连", type: select, proxies: [DIRECT, "🚀 默认代理"]}
  
  # 自动筛选区域组
  - {name: "🇭🇰 香港", type: select, use: [Airport1], filter: "(?i)港|HK|Hong"}
  - {name: "🇹🇼 台湾", type: select, use: [Airport1], filter: "(?i)台|TW|Taiwan"}
  - {name: "🇸🇬 新加坡", type: select, use: [Airport1], filter: "(?i)新|SG|Singapore"}
  - {name: "🇰🇷 韩国", type: select, use: [Airport1], filter: "(?i)韩|KR|Korea"}
  - {name: "🇯🇵 日本", type: select, use: [Airport1], filter: "(?i)日|JP|Japan"}
  - {name: "🇺🇲 美国", type: select, use: [Airport1], filter: "(?i)美|US|States|America"}
  - {name: "🌍 其他国家", type: select, use: [Airport1], filter: "^((?!(港|HK|台|TW|新|SG|日|JP|美|US|韩|KR|直连)).)*$"}
  - {name: "🌐 所有节点", type: select, use: [Airport1], proxies: [DIRECT]}

rules:
  - RULE-SET,private_domain,🎯 直连
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT
  - IP-CIDR6,::/0,REJECT,no-resolve
  # Gemini 专项硬规则
  - DOMAIN,gemini.google.com,Gemini
  - DOMAIN,aistudio.google.com,Gemini
  - DOMAIN-SUFFIX,generativelanguage.googleapis.com,Gemini
  - DOMAIN-SUFFIX,proactive.google.com,Gemini
  - DOMAIN-KEYWORD,googleusercontent,Gemini
  - DOMAIN-KEYWORD,colab,Gemini
  # 规则集匹配
  - RULE-SET,gemini_domain,Gemini
  - RULE-SET,youtube_domain,YouTube
  - RULE-SET,telegram_domain,Telegram
  - RULE-SET,google_domain,Google
  - RULE-SET,Jacking_proxy,🚀 默认代理
  - RULE-SET,Jacking_direct,🎯 直连
  - RULE-SET,apple_cn_domain,🎯 直连
  - RULE-SET,cn_domain,🎯 直连
  - RULE-SET,cn_ip,🎯 直连,no-resolve
  - MATCH,🚀 默认代理

rule-providers:
  private_domain: {type: http, interval: 259200, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"}
  gemini_domain: {type: http, interval: 259200, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google-gemini.mrs"}
  youtube_domain: {type: http, interval: 259200, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.mrs"}
  google_domain: {type: http, interval: 259200, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.mrs"}
  telegram_domain: {type: http, interval: 259200, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.mrs"}
  onedrive_domain: {type: http, interval: 259200, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/onedrive.mrs"}
  apple_cn_domain: {type: http, interval: 259200, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/apple-cn.mrs"}
  gfw_domain: {type: http, interval: 259200, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/gfw.mrs"}
  cn_domain: {type: http, interval: 259200, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs"}
  cn_ip: {type: http, interval: 259200, behavior: ipcidr, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"}
  Jacking_direct: {type: http, interval: 86400, behavior: domain, format: yaml, url: "https://raw.githubusercontent.com/taoisming/JackingList/refs/heads/main/Customize/direct.yaml"}
  Jacking_proxy: {type: http, interval: 86400, behavior: domain, format: yaml, url: "https://raw.githubusercontent.com/taoisming/JackingList/refs/heads/main/Customize/proxy.yaml"}
